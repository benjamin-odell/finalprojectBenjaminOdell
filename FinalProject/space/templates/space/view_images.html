{% extends 'base.html' %}

{% block content %}
<div class="container py-4">
  <!-- Optional page header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-light">Astronomy Gallery</h2>
  </div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for d in data %}
      <div class="col">
        <div class="card h-100 shadow-sm border-0 overflow-hidden hover-lift transition">

          <!-- Media Thumbnail -->
          <div class="position-relative" style="height: 220px;">
            {% if d.media_type == 'video' %}

              <iframe src="{{ d.url }}&autoplay=1&muted=1&controls=0&loop=1"
                      class="w-100 h-100 border-0"
                      style="object-fit: cover;"
                      referrerpolicy="strict-origin-when-cross-origin"
                      allowfullscreen>
              </iframe>
            {% else %}
              <img src="{{ d.url }}"
                   class="w-100 h-100"
                   style="object-fit: cover;"
                   alt="{{ d.title }}">
            {% endif %}
          </div>

          <!-- Card Body -->
          <div class="card-body d-flex flex-column">
            <p class="text-muted small mb-1">
              {{ d.date|date:"M j, Y" }}
            </p>
            <h5 class="card-title fw-semibold mb-3">{{ d.title }}</h5>

            <div class="mt-auto">
              <a href="{% url 'details' d.date %}" class="btn btn-outline-primary w-100">
                View Details
              </a>
            </div>
          </div>

        </div>
      </div>
    {% endfor %}
  </div>
</div>

<!-- Optional custom CSS for hover effects -->
<style>
.hover-lift {
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.hover-lift:hover {
  transform: translateY(-5px);
  box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15) !important;
}
.transition {
  transition: all 0.2s ease;
}
</style>
{% endblock %}
