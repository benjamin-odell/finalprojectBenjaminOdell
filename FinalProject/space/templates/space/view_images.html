{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
  <div class="row row-cols-1 row-cols-md-3 g-4">
    {% for d in data %}
      <div class="col">
        <div class="card h-100">

          <div class="card-body">
            <h5 class="card-title">{{ d.title }}</h5>
              {% if d.media_type == 'video' %}
                  <iframe src="{{ d.url }}&autoplay=1&muted=1&controls=0" class="card-img-top object-fit-cover" style="height: 200px;"
                          referrerpolicy="strict-origin-when-cross-origin">

                  </iframe>
              {% else%}
                  <img src="{{ d.url }}" class="card-img-top object-fit-cover" style="height: 200px;" alt="{{ d.title }}">
              {% endif %}
          </div>

        </div>
      </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
