{% extends 'base.html' %}

{% block title %}
    {{ img.title }}
{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
        <!-- Card Header with Date & Title -->
        <div class="card-header bg-transparent border-0 pt-4 px-4">
            <h3 class="text-secondary fw-light mb-1">{{ img.date }}</h3>
            <h1 class="display-5 fw-bold text-dark">{{ img.title }}</h1>
        </div>

        <!-- Media Display (Video or Image) -->
        <div class="card-body p-0">
            {% if img.media_type == 'video' %}
                <div class="ratio ratio-16x9">
                    <iframe src="{{ img.url }}&muted=1&controls=1"
                            class="w-100 h-100"
                            referrerpolicy="strict-origin-when-cross-origin"
                            allowfullscreen
                            style="border:0;">
                    </iframe>
                </div>
            {% else %}
                <div class="text-center bg-light p-3">
                    <img src="{{ img.url }}"
                         alt="{{ img.title }}"
                         class="img-fluid rounded-3 shadow-sm"
                         style="max-height: 70vh; object-fit: contain;">
                </div>
            {% endif %}
        </div>

        <!-- Explanation Content -->
        <div class="card-body px-4 pb-4">
            <div class="mt-3">
                <p class="lead fs-5 text-muted">{{ img.explanation }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
